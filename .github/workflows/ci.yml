name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.x'

    - name: Restore dependencies
      run: dotnet restore Lib.MeshBus.sln

    - name: Build
      run: dotnet build Lib.MeshBus.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test Lib.MeshBus.sln --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

    - name: Upload coverage
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: coverage-report
        path: '**/coverage.cobertura.xml'
        retention-days: 7
